<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Contact - Clubs Universitaires</title>
<link rel="stylesheet" href="contact.css">
</head>

<body>

<header>
<h1>Contactez les Clubs Universitaires</h1>
</header>

<div class="container">

<div class="contact-info">
<h2>Informations</h2>
<p>📧 Email : clubs@contact.com</p>
<p>📞 Téléphone : +212 600000000</p>
<p>📍 Adresse : Administration des clubs</p>
</div>

<div class="contact-form">
<h2>Envoyer un message</h2>

<form>
<input type="text" placeholder="Nom" required>
<input type="email" placeholder="Email" required>
<input type="text" placeholder="Sujet" required>

<select required>
<option value="" disabled selected hidden>Club concerné</option>
<option>Club E-team</option>
<option>Club AI</option>
<option>Club Agora</option>
<option>Club Économie</option>
<option>Club Astronomie</option>
<option>Club Enactus</option>
</select>

<textarea placeholder="Votre message" required></textarea>

<button type="submit">Envoyer</button>

</form>
</div>

</div>

</body>
</html>
